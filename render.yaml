services:
  - type: web
    name: skycast-backend
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install .
    startCommand: uvicorn skycast.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
