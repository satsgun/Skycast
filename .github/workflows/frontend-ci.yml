name: Frontend CI

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Generate coverage badge data
        run: |
          pct=$(node -e "console.log(Math.round(require('./coverage/coverage-summary.json').total.lines.pct))")
          if [ "$pct" -ge 90 ]; then color=brightgreen
          elif [ "$pct" -ge 75 ]; then color=green
          elif [ "$pct" -ge 50 ]; then color=yellow
          else color=red
          fi
          mkdir -p "$GITHUB_WORKSPACE/.github/badges"
          printf '{"schemaVersion":1,"label":"frontend coverage","message":"%s%%","color":"%s"}\n' "$pct" "$color" > "$GITHUB_WORKSPACE/.github/badges/frontend-coverage.json"

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/frontend-coverage.json
          if ! git diff --cached --quiet; then
            git commit -m "Update frontend coverage badge [skip ci]"
            git push
          fi
