name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Generate coverage badge data
        run: |
          coverage json -o coverage.json
          pct=$(python3 -c "import json; print(round(json.load(open('coverage.json'))['totals']['percent_covered']))")
          if [ "$pct" -ge 90 ]; then color=brightgreen
          elif [ "$pct" -ge 75 ]; then color=green
          elif [ "$pct" -ge 50 ]; then color=yellow
          else color=red
          fi
          mkdir -p "$GITHUB_WORKSPACE/.github/badges"
          printf '{"schemaVersion":1,"label":"backend coverage","message":"%s%%","color":"%s"}\n' "$pct" "$color" > "$GITHUB_WORKSPACE/.github/badges/backend-coverage.json"

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/backend-coverage.json
          if ! git diff --cached --quiet; then
            git commit -m "Update backend coverage badge [skip ci]"
            git push
          fi

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
